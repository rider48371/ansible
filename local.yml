---
- hosts: localhost
  connection: local
  become: true

  vars:
    repo_files_dir: "/opt/ansible/files"
    user_home: "/home/fred"
    
    symlink_configs:
      - { src: "alacritty", dest: ".config/alacritty" }
      - { src: "bashrc", dest: ".bashrc" }
      - { src: "i3", dest: ".config/i3" }
      - { src: "picom", dest: ".config/picom" }
      - { src: "qtile", dest: ".config/qtile" }
      - { src: "rofi", dest: ".config/rofi" }
      - { src: "tmux.conf", dest: ".tmux.conf" }
      - { src: "vnc", dest: ".vnc" }
      - { src: "wallpapers", dest: "Pictures/wallpapers" }
      - { src: ".local/bin/wifimenu", dest: ".local/bin/wifimenu" }

  tasks:
    - name: Execute configuration management with error handling
      block:
        - name: Install system packages
          ansible.builtin.package:
            name:
              - htop
              - xclip
              - lxsession
              - volumeicon
              - rofi-emoji
              - rofi-calc
              - libqalculate
              - pacman-contrib
              - vim
              - alacritty
              - fastfetch
              - clipmenu
              - starship
              - ranger
              - exa
              - gparted
              - okular
              - vlc
              - dolphin
              - dunst
              - libreoffice-fresh
              - qbittorrent
              - feh
              - tmux
              - cronie
              - openssh
              - xterm
              - dmenu
              - rofi
              - i3
              - i3blocks
              - i3lock
              - network-manager-applet
              - acpi
              - python3
              - qtile
              - python-dbus-next
              - tigervnc
              - neovim
              - nodejs
              - npm
              - ttf-font-awesome
              - otf-font-awesome
              - ttf-sourcecodepro-nerd
              - ttf-ubuntu-font-family
              - ttf-mononoki-nerd
              - ttf-jetbrains-mono-nerd
              - lxappearance
              - xdotool
              - steam
              - wine
              - winetricks
              - lutris
            state: present

        - name: Ensure baseline local directory skeletons exist
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            owner: fred
            group: fred
            mode: '0755'
          loop:
            - "{{ user_home }}/.local/bin"
            - "{{ user_home }}/.local/share/applications"
            - "{{ user_home }}/.config"
            - "{{ user_home }}/Pictures"

        - name: Enable and start system baseline services
          ansible.builtin.service:
            name: "{{ item }}"
            state: started
            enabled: yes
          loop:
            - sshd
            - cronie
            - bluetooth

        - name: Process configuration symlinks uniformly
          ansible.builtin.file:
            src: "{{ repo_files_dir }}/{{ item.src }}"
            dest: "{{ user_home }}/{{ item.dest }}"
            state: link
            force: yes
            owner: fred
            group: fred
          loop: "{{ symlink_configs }}"

        - name: Copy target application MIME map configuration file
          ansible.builtin.copy:
            src: "{{ repo_files_dir }}/.local/share/applications/mimeapps.list"
            dest: "{{ user_home }}/.local/share/applications/mimeapps.list"
            owner: fred
            group: fred
            mode: '0644'

        - name: Add dedicated system execution user account
          ansible.builtin.user:
            name: velociraptor
            system: yes
            create_home: no

        - name: Ensure home directory skeleton exists for the automation user
          ansible.builtin.file:
            path: /home/velociraptor
            state: directory
            owner: velociraptor
            group: velociraptor
            mode: '0700'

        - name: Set up isolated passwordless sudo access rule for automation user
          ansible.builtin.copy:
            src: files/sudoer_velociraptor
            dest: /etc/sudoers.d/velociraptor
            owner: root
            group: root
            mode: '0440'

        # Git Trust Configurations (Bypasses Dubious Ownership Errors Globally)
        - name: Globally trust the ansible directory for Root context
          ansible.builtin.command:
            cmd: git config --global --add safe.directory /opt/ansible
          changed_when: false

        - name: Globally trust the ansible directory for Velociraptor context
          ansible.builtin.command:
            cmd: git config --global --add safe.directory /opt/ansible
          become: true
          become_user: velociraptor
          changed_when: false

        # Desktop Power Configurations (Skips your laptop 'omen')
        - name: Prevent systemd sleep targets on desktop environments
          ansible.builtin.systemd:
            name: "{{ item }}"
            masked: yes
          loop:
            - sleep.target
            - suspend.target
            - hibernate.target
            - hybrid-sleep.target
          when: ansible_facts['hostname'] != 'omen'

        - name: Force KDE powerdevil profile to never sleep on desktops
          ansible.builtin.shell: |
            kwriteconfig6 --file powermanagementprofilesrc --group AC --group DimDisplay --key idleTime 0
            kwriteconfig6 --file powermanagementprofilesrc --group AC --group ScreenBrightness --key idleTime 0
            kwriteconfig6 --file powermanagementprofilesrc --group AC --group SuspendSession --key idleTime 0
            kwriteconfig6 --file powermanagementprofilesrc --group AC --group SuspendSession --key suspendType 0
            qdbus6 org.kde.Solid.PowerManagement /org/kde/Solid/PowerManagement refreshProfileConfig
          become: true
          become_user: fred
          changed_when: false
          when: ansible_facts['hostname'] != 'omen'
          failed_when: false

      rescue:
        - name: Send desktop notification on playbook routine failure
          ansible.builtin.shell: |
            sudo -u fred DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/1000/bus \
            notify-send -u critical -i dialog-error "Ansible Provisioning Failed" "A task failed during the local.yml playbook execution check journalctl for details."
          failed_when: false

    - name: Add structured background ansible-pull automation schedule
      ansible.builtin.cron:
        name: "Ansible auto-provision"
        user: velociraptor
        minute: "*/1"
        job: "cd /opt/ansible && ansible-pull -f -o -U https://github.com/rider48371/ansible.git -d /opt/ansible local.yml || (sudo -u fred DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/1000/bus notify-send -u critical -i network-error 'Ansible Pull Failed' 'The background repository sync failed.')"

